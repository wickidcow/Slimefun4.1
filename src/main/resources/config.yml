# Albion English defaults.
# The in-plugin auto-updater is disabled because it would replace this English
# fork with an untranslated upstream build. Use the included GitHub sync workflow instead.
options:
  auto-update: false
  chat-prefix: '&a&lSlimefun &7> '
  armor-update-interval: 10
  enable-armor-effects: true
  enable-radiation: true
  radiation-update-interval: 1
  radiation-grace-period: 15
  rainbow-armor-update-interval: 3
  auto-save-delay-in-minutes: 10
  legacy-ore-washer: false
  legacy-dust-washer: false
  legacy-ore-grinder: true
  # Force all players to use the server's English language.
  language: en
  enable-translations: false
  log-duplicate-block-entries: true
  burn-players-when-radioactive: true
  drop-excess-sf-give-items: false
  backup-data: true
  drop-block-creative: true
  bypass-environment-check: false
  bypass-item-length-check: false
  max-gps-waypoints: 21

guide:
  # Show vanilla recipes in the Slimefun guide.
  show-vanilla-recipes: true
  # Give the guide when a player joins for the first time.
  receive-on-first-join: true
  # Include hidden groups in guide search results.
  show-hidden-item-groups-in-search: false

researches:
  # Creative players can unlock researches without paying.
  free-in-creative-mode: true
  # Display fireworks when a research is unlocked.
  enable-fireworks: true
  # Use Vault currency instead of experience levels.
  use-money-unlock: false
  # Experience-level to currency conversion rate.
  currency-cost-convert-rate: 25.0
  # Skip the research-learning animation.
  disable-learning-animation: false

URID:
  info-delay: 3000
  custom-ticker-delay: 10
  enable-tickers: true

networks:
  max-size: 200
  cargo-ticker-delay: 0
  enable-visualizer: true
  delete-excess-items: false

talismans:
  use-actionbar: true

metrics:
  auto-update: false

backpack:
  # Allow a backpack to open while its owner is offline.
  allow-open-when-owner-offline: true

research-ranks:
  - Chicken
  - Cow
  - Spider
  - Villager
  - Beginner
  - Clumsy Student
  - Unskilled Student
  - Incompetent Student
  - Student
  - Clumsy Apprentice
  - Apprentice
  - Skilled Apprentice
  - Upcoming Mage
  - Excellent Mage
  - Young Magician
  - Incompetent Magician
  - Common Magician
  - Magician
  - Proficient Magician
  - Skilled Magician
  - Accustomed Magician
  - Great Magician
  - Clumsy Wizard
  - Wizard
  - Common Wizard
  - Skilled Wizard
  - Great Wizard
  - Impressive Wizard
  - Young Master
  - Clumsy Master
  - Upcoming Master
  - Competent Master
  - Master
  - Skilled Master
  - Excellent Master
  - Great Master
  - Proficient Master
  - The Chosen One
