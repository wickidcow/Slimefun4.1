name: Pull Request Checker

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify English-only behavior
        run: python3 scripts/verify_english.py .

      - name: Format and build
        run: |
          chmod +x gradlew
          ./gradlew spotlessApply --no-daemon
          ./gradlew clean build --no-daemon

      - name: Locate built JAR
        run: |
          FILENAME=$(find build/libs -maxdepth 1 -type f -name 'Slimefun-*.jar' ! -name '*-sources.jar' -printf '%f\n')
          test -n "$FILENAME"
          test "$(printf '%s\n' "$FILENAME" | wc -l)" -eq 1
          echo "SLIMEFUN_JAR=$FILENAME" >> "$GITHUB_ENV"

      - name: Upload preview JAR
        uses: actions/upload-artifact@v7
        with:
          name: Slimefun-PR-${{ github.run_number }}
          path: build/libs/${{ env.SLIMEFUN_JAR }}
          if-no-files-found: error
