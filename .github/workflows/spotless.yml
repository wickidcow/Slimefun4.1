name: Spotless

on:
  push:
    branches: [master, dev]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/libs.versions.toml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/libs.versions.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spotless:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Apply and verify formatting
        run: |
          chmod +x gradlew
          ./gradlew spotlessApply --no-daemon
          ./gradlew spotlessCheck --no-daemon
